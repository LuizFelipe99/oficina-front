<h2>Serviços</h2>

<table>
  <thead>
    <tr>
      <th>ID</th>
      <th>Descrição</th>
      <th>Status</th>
      <th>Preço</th>
    </tr>
  </thead>

  <tbody>
    <tr *ngFor="let service of services">
      <td>{{ service.id }}</td>
      <td>{{ service.description }}</td>
      <td>{{ service.status }}</td>
      <td>{{ service.price }}</td>
    </tr>
  </tbody>
</table>
